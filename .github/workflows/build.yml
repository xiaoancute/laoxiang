name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Test
        run: gradle test

      - name: Build
        run: gradle build

      - name: Smoke test packaged server jar
        run: bash scripts/smoke-test-server.sh

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: ip-location-display-jar
          path: build/libs/*.jar
